# input-example.yaml
# 用途：演示 xrelay/yaml2json.py 当前支持的 YAML 输入格式
#
# 说明：
# 1. 这是 yaml2json 脚本的输入示例，不是 clashsub 主服务的完整订阅输入格式
# 2. 当前脚本实际支持的 inbound 只有：
#    - shadowsocks
#    - vmess
#    - socks5
#    - http
# 3. 当前脚本支持的 outbound 协议有：
#    - socks
#    - http
#    - vless
#    - file
# 4. 所有 inbound 的端口都只从 tag 中解析，格式必须是 "type:port:remark"
#    - 例如 tag: "ss:4000:demo-ss"，最终端口就是 4000
#    - 即使你手工写了独立的 port 字段，脚本也会被 tag 中的端口覆盖
#    - 因此 inbound 不建议再额外写 port，避免误解
# 5. user / server / sub 这些字段主要是为了和 clashsub / 其它模板保持输入风格一致
#    yaml2json.py 生成 xray inbound JSON 时并不会使用它们
# 6. vmess 有额外约束：
#    - 每条 vmess 都必须填写 network
#    - 同一个文件中的所有 vmess，tag 里的端口必须一致
#    - 同一个文件中的所有 vmess，network 必须一致

inbounds:
  config:
    # xray 日志级别
    loglevel: info
    # 兼容旧字段：如果 log_access / log_error 为空，会回退到 logfile
    logfile: /tmp/xrelay-demo.log
    # access/error 日志路径；为空时按 xray 默认行为处理
    log_access: ""
    log_error: ""
    # xray Stats API 监听端口
    api_port: 18080

  shadowsocks:
    - user: demo-user
      tag: "ss:4000:demo-ss"
      server: ss.example.com
      cipher: aes-256-gcm
      password: "replace-with-strong-password"
      udp: true
      sub: true

  vmess:
    # 注意：vmess 会被合并成一个 inbound
    - user: demo-user
      tag: "vmess:4010:demo-vmess-01"
      server: vmess.example.com
      cipher: auto
      uuid: "11111111-2222-3333-4444-555555555555"
      alterId: 0
      network: ws
      sub: true

    - user: demo-user
      tag: "vmess:4010:demo-vmess-02"
      server: vmess-backup.example.com
      cipher: auto
      uuid: "66666666-7777-8888-9999-aaaaaaaaaaaa"
      alterId: 0
      network: ws
      sub: true

  socks5:
    # Socks5 无鉴权
    - user: demo-user
      tag: "socks5:4020:demo-socks5-noauth"
      server: socks5.example.com
      udp: true
      auth: noauth
      sub: true

    # Socks5 用户名密码鉴权
    - user: demo-user
      tag: "socks5:4021:demo-socks5-auth"
      server: socks5-auth.example.com
      udp: true
      auth: password
      username: "demo_socks5_user"
      password: "demo_socks5_pass"
      sub: true

  http:
    # HTTP 代理无鉴权
    - user: demo-user
      tag: "http:4030:demo-http-noauth"
      server: http.example.com
      sub: true

    # HTTP 代理用户名密码鉴权
    - user: demo-user
      tag: "http:4031:demo-http-auth"
      server: http-auth.example.com
      username: "demo_http_user"
      password: "demo_http_pass"
      sub: true

  outbound:
    # 下面四种 outbound 选一种启用即可

    # 示例 1：Socks 出站
    protocol: socks
    server: 127.0.0.1
    port: 7891
    # auth: password
    # username: outbound_socks_user
    # password: outbound_socks_pass

    # 示例 2：HTTP 出站
    # protocol: http
    # server: 127.0.0.1
    # port: 8080
    # auth: password
    # username: outbound_http_user
    # password: outbound_http_pass

    # 示例 3：VLESS 出站
    # protocol: vless
    # server: vless-out.example.com
    # port: 443
    # uuid: "99999999-aaaa-bbbb-cccc-dddddddddddd"
    # flow: xtls-rprx-direct
    # encryption: none
    # level: 0
    # network: tcp
    # security: xtls

    # 示例 4：从 JSON 文件直接加载 outbound
    # protocol: file
    # file: ./outbound.json
